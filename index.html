
<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AngliBot AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      color: #000000;
      -webkit-tap-highlight-color: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    
    /* Smooth transitions for mobile menu */
    .mobile-sidebar-enter { transform: translateX(-100%); }
    .mobile-sidebar-enter-active { transform: translateX(0); transition: transform 0.3s ease-out; }
    .mobile-sidebar-exit { transform: translateX(0); }
    .mobile-sidebar-exit-active { transform: translateX(-100%); transition: transform 0.3s ease-in; }
  </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",

    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
</head>
<body class="bg-white transition-colors duration-300 overflow-hidden">

</body>
